services:
  # New React frontend running in Docker
  frontend:
    image: node:20-alpine
    container_name: pocketdev-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:3005
      - VITE_USE_MOCKS=false
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - default

  shelltender:
    environment:
      - NODE_ENV=development
    user: root
    command: sh -c "cd /app/shelltender && npm install && node shelltender-service.js"
    volumes:
      - ./:/app
  
  backend:
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - LOG_REQUESTS=${LOG_REQUESTS:-true}
    user: root
    command: sh -c "cd /app/backend && npm install && npm run dev"
    volumes:
      - ./:/app
  
