version: '3.8'

services:
  shelltender:
    build:
      context: .
      dockerfile: Dockerfile.shelltender-secure
      args:
        - HOST_UID=${HOST_UID:-1000}
        - HOST_GID=${HOST_GID:-1000}
    container_name: shelltender-secure
    working_dir: /app
    volumes:
      - ./:/app
      - ./data:/app/data
      - ./projects:/projects
      # No Docker socket mounting - will use alternative approach
    ports:
      - "8080:8080"
    environment:
      # UID/GID mapping
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
      # Shelltender config
      - SHELLTENDER_PORT=8080
      - SHELLTENDER_DATA_DIR=/app/data/shelltender-sessions
      # Use Docker secrets instead of environment variables for sensitive data
      - ANTHROPIC_API_KEY_FILE=/run/secrets/anthropic_api_key
      - OPENAI_API_KEY_FILE=/run/secrets/openai_api_key
      - GITHUB_TOKEN_FILE=/run/secrets/github_token
    secrets:
      - anthropic_api_key
      - openai_api_key
      - github_token
    # Run as root initially, entrypoint will drop privileges
    user: root
    command: >
      sh -c "cd /app/server && node shelltender-unified.js"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "gosu", "pocketdev", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend-secure
      args:
        - HOST_UID=${HOST_UID:-1000}
        - HOST_GID=${HOST_GID:-1000}
    container_name: backend-secure
    working_dir: /app
    volumes:
      - ./:/app
      - ./data:/app/data
      - ./projects:/projects
      # SSH keys with proper permissions
      - ~/.ssh:/home/pocketdev/.ssh:ro
      # No Docker socket - will use API-based approach
    ports:
      - "3005:3005"
    environment:
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
      - NODE_ENV=production
      - PORT=3005
      - GITHUB_TOKEN_FILE=/run/secrets/github_token
      - ENCRYPTION_KEY_FILE=/run/secrets/encryption_key
      # Non-sensitive configuration
      - FRONTEND_URL=http://localhost:5173
      - SHELLTENDER_URL=http://shelltender-secure:8080
      # Observability settings
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_REQUESTS=${LOG_REQUESTS:-true}
    secrets:
      - github_token
      - encryption_key
    user: root  # Entrypoint will drop privileges
    command: ["node", "server/server.js"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "gosu", "pocketdev", "curl", "-f", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - shelltender
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID

  frontend:
    image: node:22-alpine
    container_name: frontend-secure
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules  # Anonymous volume for node_modules
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://localhost:3005
    # Frontend doesn't need UID mapping since it doesn't write to host
    user: node
    command: >
      sh -c "npm install && npm run dev -- --host"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

networks:
  default:
    name: pocketdev-network-secure

volumes:
  # Use volumes for data that doesn't need host access
  pocketdev-settings:
    name: pocketdev-settings-secure
  node-modules-frontend:
    name: pocketdev-frontend-modules-secure

# Define secrets (values come from .env or docker secrets)
secrets:
  anthropic_api_key:
    environment: ANTHROPIC_API_KEY
  openai_api_key:
    environment: OPENAI_API_KEY
  github_token:
    environment: GITHUB_TOKEN
  encryption_key:
    environment: ENCRYPTION_KEY