<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test</title>
</head>
<body>
    <h1>WebSocket Proxy Test</h1>
    <div id="status">Testing...</div>
    <pre id="log"></pre>
    
    <script>
        const log = document.getElementById('log');
        const status = document.getElementById('status');
        
        function addLog(msg) {
            log.textContent += msg + '\n';
            console.log(msg);
        }
        
        // Test the proxied WebSocket endpoint
        addLog('Attempting to connect to ws://localhost:5173/shelltender-ws');
        const ws = new WebSocket('ws://localhost:5173/shelltender-ws');
        
        ws.onopen = () => {
            status.textContent = 'Connected!';
            addLog('WebSocket connected successfully');
            
            // Try to create a session
            const msg = JSON.stringify({
                type: 'create',
                sessionId: 'test-' + Date.now(),
                options: {
                    command: 'bash'
                }
            });
            addLog('Sending: ' + msg);
            ws.send(msg);
        };
        
        ws.onmessage = (event) => {
            addLog('Received: ' + event.data);
        };
        
        ws.onerror = (error) => {
            status.textContent = 'Error!';
            addLog('WebSocket error');
            console.error('WebSocket error:', error);
        };
        
        ws.onclose = (event) => {
            status.textContent = 'Disconnected';
            addLog(`WebSocket closed: code=${event.code} reason=${event.reason}`);
        };
    </script>
</body>
</html>
