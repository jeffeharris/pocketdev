events {
    worker_connections 1024;
}

http {
    upstream backend {
        server backend:3005;
    }

    upstream shelltender {
        server shelltender:8080;
    }

    upstream frontend {
        server frontend:80;
    }

    server {
        listen 80;
        server_name app.pocketdev.ai;

        # Basic authentication
        auth_basic "PocketDev - Authorized Users Only";
        auth_basic_user_file /etc/nginx/.htpasswd;

        # Redirect to HTTPS in production
        # return 301 https://$server_name$request_uri;

        # Frontend (React app)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Backend API
        location /api/ {
            proxy_pass http://backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend WebSocket
        location /ws {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Shelltender API
        location /shelltender-api/ {
            proxy_pass http://shelltender/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Shelltender WebSocket
        location /shelltender-ws {
            proxy_pass http://shelltender;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            rewrite ^/shelltender-ws(.*)$ /ws$1 break;
        }

        # Shelltender terminal HTML
        location /shelltender-terminal.html {
            proxy_pass http://backend/shelltender-terminal.html;
        }
    }

    # HTTPS configuration (uncomment after setting up SSL)
    # server {
    #     listen 443 ssl;
    #     server_name app.pocketdev.ai;
    #
    #     ssl_certificate /etc/letsencrypt/live/app.pocketdev.ai/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/app.pocketdev.ai/privkey.pem;
    #
    #     # Same location blocks as above...
    # }
}