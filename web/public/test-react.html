<!DOCTYPE html>
<html>
<head>
    <title>React Component Test</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-section { margin: 20px 0; padding: 20px; border: 2px solid #ccc; }
        .status { padding: 10px; margin: 10px 0; }
        .success { background: #d4edda; color: #155724; }
        .info { background: #cce5ff; color: #004085; }
        .engineer-card { 
            border: 1px solid #ddd; 
            padding: 15px; 
            margin: 10px;
            border-radius: 8px;
            background: #f8f9fa;
        }
    </style>
</head>
<body>
    <h1>PocketDev React Component Test</h1>
    
    <div class="test-section">
        <h2>1. Basic React Test</h2>
        <div id="react-test"></div>
    </div>
    
    <div class="test-section">
        <h2>2. API Data Test</h2>
        <div id="api-test"></div>
    </div>
    
    <div class="test-section">
        <h2>3. Live Engineers Status</h2>
        <div id="engineers-test"></div>
    </div>
    
    <script>
        const e = React.createElement;
        
        // Test 1: Basic React
        const BasicTest = () => {
            return e('div', {className: 'status success'}, 
                '✓ React is working! If you see this, React is rendering correctly.'
            );
        };
        
        const root1 = ReactDOM.createRoot(document.getElementById('react-test'));
        root1.render(e(BasicTest));
        
        // Test 2: API Test
        fetch('http://localhost:3001/api/engineers')
            .then(res => res.json())
            .then(data => {
                const APITest = () => {
                    return e('div', {className: 'status info'}, 
                        `✓ Backend API is working! Found ${data.length} engineers.`
                    );
                };
                const root2 = ReactDOM.createRoot(document.getElementById('api-test'));
                root2.render(e(APITest));
            })
            .catch(err => {
                document.getElementById('api-test').innerHTML = 
                    '<div class="status error">✗ Backend API error: ' + err + '</div>';
            });
        
        // Test 3: Live Engineers Component
        const EngineersComponent = () => {
            const [engineers, setEngineers] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            
            React.useEffect(() => {
                const fetchEngineers = () => {
                    fetch('http://localhost:3001/api/engineers')
                        .then(res => res.json())
                        .then(data => {
                            setEngineers(data);
                            setLoading(false);
                        });
                };
                
                fetchEngineers();
                const interval = setInterval(fetchEngineers, 1000);
                return () => clearInterval(interval);
            }, []);
            
            if (loading) return e('div', null, 'Loading...');
            
            return e('div', null,
                e('p', {className: 'status info'}, 
                    `✓ Live updates working! Refreshing every second.`
                ),
                engineers.map(eng => 
                    e('div', {key: eng.id, className: 'engineer-card'},
                        e('h3', null, eng.name),
                        e('p', null, `Status: ${eng.status}`),
                        eng.current_task && e('p', null, `Task: ${eng.current_task}`),
                        eng.progress !== undefined && e('p', null, `Progress: ${eng.progress}%`)
                    )
                )
            );
        };
        
        const root3 = ReactDOM.createRoot(document.getElementById('engineers-test'));
        root3.render(e(EngineersComponent));
    </script>
</body>
</html>
