# Minimal tmux configuration for transparent terminal experience

# Remove the status bar completely
set -g status off

# Use full color support and preserve terminal features
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -as terminal-features ",xterm-256color:RGB"

# Enable true color support
set-option -sa terminal-overrides ",xterm*:Tc"

# Enable mouse support (for scrolling)
set -g mouse on

# Remove delay when switching modes
set -s escape-time 0

# Increase scrollback buffer size
set -g history-limit 50000

# Remove all borders
set -g pane-border-style 'fg=black'
set -g pane-active-border-style 'fg=black'

# Don't rename windows automatically
set-option -g allow-rename off

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Quiet mode
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action none

# Better support for alternate screen applications (like Ink)
set -g alternate-screen on

# Preserve terminal capabilities
set -g terminal-overrides 'xterm*:smcup@:rmcup@'

# Remove all keybindings except essentials
unbind-key -a
# Keep only detach (Ctrl-b d)
bind-key -T prefix d detach-client
# Keep scrollback (Ctrl-b [)
bind-key -T prefix [ copy-mode
# Set prefix
set -g prefix C-b
bind-key C-b send-prefix