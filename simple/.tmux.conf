# tmux configuration optimized for PocketDev terminal persistence
# Compatible with OAuth flow and Ink rendering

# Terminal setup for proper color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -as terminal-features ",*:RGB"

# CRITICAL: Disable mouse mode to allow normal browser copy/paste
# This fixes OAuth code pasting issues
set -g mouse off

# Enable vi mode for keyboard scrolling
# Use Ctrl-b [ to enter copy mode, then:
# - Arrow keys or h/j/k/l to move
# - Page Up/Page Down to scroll pages
# - g to go to top, G to go to bottom
# - / to search forward, ? to search backward
# - q to exit copy mode
setw -g mode-keys vi

# Completely disable mouse wheel events
bind -n WheelUpPane send-keys ""
bind -n WheelDownPane send-keys ""

# Performance optimizations
set -s escape-time 0
set -g focus-events on

# Large scrollback for long outputs
set -g history-limit 50000

# Minimal status bar to not interfere with Claude
set -g status on
set -g status-position bottom
set -g status-style "bg=#1a1a1a,fg=#666666"
set -g status-left ""
set -g status-right ""
set -g status-left-length 0
set -g status-right-length 0

# Window numbering
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Quiet operation
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set -g bell-action none

# UTF-8 support (for older tmux versions)
# set -g utf8 on
# set -g status-utf8 on