<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelltender Terminal Test</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1e1e1e;
            color: #ccc;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: #fff;
            margin-bottom: 30px;
        }
        
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        button {
            background: #0066cc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        button:hover {
            background: #0052a3;
        }
        
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        
        .terminal-container {
            background: #000;
            border-radius: 8px;
            padding: 20px;
            min-height: 500px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        
        #terminal {
            width: 100%;
            height: 500px;
        }
        
        .info {
            margin-top: 20px;
            padding: 15px;
            background: #2a2a2a;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
        }
        
        .session-list {
            margin: 20px 0;
            padding: 15px;
            background: #2a2a2a;
            border-radius: 5px;
        }
        
        .session-item {
            padding: 10px;
            margin: 5px 0;
            background: #3a3a3a;
            border-radius: 3px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .session-item:hover {
            background: #4a4a4a;
        }
        
        .session-item.active {
            background: #0066cc;
        }
        
        .status {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #27c93f;
            margin-right: 10px;
        }
        
        .status.disconnected {
            background: #ff5f56;
        }
        
        .command-input {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        
        input[type="text"] {
            flex: 1;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 5px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Shelltender Terminal Test</h1>
        
        <div class="controls">
            <button onclick="createSession()">Create Test Session</button>
            <button onclick="listSessions()">List Sessions</button>
            <button onclick="connectToSession()" id="connectBtn" disabled>Connect to Session</button>
            <button onclick="disconnect()" id="disconnectBtn" disabled>Disconnect</button>
        </div>
        
        <div class="session-list" id="sessionList" style="display: none;">
            <h3>Active Sessions:</h3>
            <div id="sessions"></div>
        </div>
        
        <div class="terminal-container">
            <div id="terminal">
                <div style="color: #888; text-align: center; padding-top: 200px;">
                    Click "Create Test Session" to start a new terminal session
                </div>
            </div>
        </div>
        
        <div class="command-input">
            <input type="text" id="commandInput" placeholder="Enter command to execute..." disabled>
            <button onclick="executeCommand()" id="executeBtn" disabled>Execute</button>
        </div>
        
        <div class="info" id="info">
            <strong>Status:</strong> <span id="status">Not connected</span><br>
            <strong>Session ID:</strong> <span id="sessionId">-</span><br>
            <strong>WebSocket URL:</strong> <span id="wsUrl">-</span>
        </div>
    </div>

    <script>
        let currentSessionId = null;
        let ws = null;
        
        async function createSession() {
            try {
                // For testing, we'll create a simple session directly
                const sessionId = 'test-' + Date.now();
                
                // Connect to shelltender WebSocket
                connectToWebSocket(sessionId);
                
            } catch (error) {
                console.error('Error creating session:', error);
                alert('Error creating session: ' + error.message);
            }
        }
        
        async function listSessions() {
            try {
                const response = await fetch('/api/sessions');
                const sessions = await response.json();
                
                document.getElementById('sessionList').style.display = 'block';
                const container = document.getElementById('sessions');
                
                if (sessions.length === 0) {
                    container.innerHTML = '<div style="color: #888;">No active sessions</div>';
                } else {
                    container.innerHTML = sessions.map(session => `
                        <div class="session-item ${session.id === currentSessionId ? 'active' : ''}" 
                             onclick="selectSession('${session.id}')">
                            <div>
                                <span class="status"></span>
                                <strong>${session.name}</strong> (${session.id})
                            </div>
                            <div style="color: #888; font-size: 11px;">
                                ${new Date(session.lastActivity).toLocaleString()}
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error listing sessions:', error);
            }
        }
        
        function selectSession(sessionId) {
            currentSessionId = sessionId;
            document.getElementById('sessionId').textContent = sessionId;
            document.getElementById('connectBtn').disabled = false;
            
            // Update active state
            document.querySelectorAll('.session-item').forEach(item => {
                item.classList.remove('active');
            });
            event.target.closest('.session-item').classList.add('active');
        }
        
        function connectToWebSocket(sessionId) {
            if (ws) {
                ws.close();
            }
            
            currentSessionId = sessionId;
            const wsUrl = `ws://${window.location.host}/ws/shelltender?session=${sessionId}`;
            
            document.getElementById('terminal').innerHTML = '<div style="color: #888;">Connecting to terminal...</div>';
            document.getElementById('status').textContent = 'Connecting...';
            document.getElementById('sessionId').textContent = sessionId;
            document.getElementById('wsUrl').textContent = wsUrl;
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                console.log('WebSocket connected');
                document.getElementById('status').textContent = 'Connected';
                document.getElementById('terminal').innerHTML = '<pre id="output" style="margin: 0; white-space: pre-wrap; word-wrap: break-word;"></pre>';
                document.getElementById('disconnectBtn').disabled = false;
                document.getElementById('commandInput').disabled = false;
                document.getElementById('executeBtn').disabled = false;
                
                // Request terminal output
                ws.send(JSON.stringify({ type: 'request-output' }));
            };
            
            ws.onmessage = (event) => {
                const output = document.getElementById('output');
                if (output) {
                    // Handle both raw text and JSON messages
                    try {
                        const data = JSON.parse(event.data);
                        if (data.type === 'output') {
                            output.textContent += data.data;
                        } else if (data.type === 'restore') {
                            output.textContent = data.data || '';
                        }
                    } catch (e) {
                        // Raw text output
                        output.textContent += event.data;
                    }
                    
                    // Auto-scroll to bottom
                    output.scrollTop = output.scrollHeight;
                }
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                document.getElementById('status').textContent = 'Error';
            };
            
            ws.onclose = () => {
                console.log('WebSocket disconnected');
                document.getElementById('status').textContent = 'Disconnected';
                document.getElementById('disconnectBtn').disabled = true;
                document.getElementById('commandInput').disabled = true;
                document.getElementById('executeBtn').disabled = true;
                ws = null;
            };
        }
        
        function connectToSession() {
            if (currentSessionId) {
                connectToWebSocket(currentSessionId);
            }
        }
        
        function disconnect() {
            if (ws) {
                ws.close();
                document.getElementById('terminal').innerHTML = '<div style="color: #888; text-align: center; padding-top: 200px;">Disconnected</div>';
            }
        }
        
        async function executeCommand() {
            const command = document.getElementById('commandInput').value;
            if (!command || !currentSessionId) return;
            
            try {
                const response = await fetch(`/api/sessions/${currentSessionId}/execute`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command })
                });
                
                if (!response.ok) {
                    throw new Error('Failed to execute command');
                }
                
                document.getElementById('commandInput').value = '';
            } catch (error) {
                console.error('Error executing command:', error);
                alert('Error executing command: ' + error.message);
            }
        }
        
        // Allow Enter key to execute command
        document.getElementById('commandInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                executeCommand();
            }
        });
        
        // Load sessions on page load
        listSessions();
    </script>
</body>
</html>
