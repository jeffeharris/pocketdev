    async function performUpdate(taskId) {
      const method = document.querySelector('input[name="updateMethod"]:checked').value;
      const withClaude = document.getElementById('withClaude').checked;
      
      const button = document.querySelector(`[onclick="updateTask('${taskId}')"]`);
      if (button) {
        button.disabled = true;
        button.textContent = 'Updating...';
      }
      
      try {
        const response = await fetch(`${API_BASE}/projects/${projectId}/tasks/${taskId}/update`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ method, withClaude })
        });
        
        const result = await response.json();
        
        if (response.ok && result.success) {
          if (result.claudeAssisted && result.mergeTask) {
            // Merge task created - navigate to it
            showNotification(`Opening Claude to assist with ${method}...`, 'info');
            
            // Reload tasks to include the new merge task
            await loadTasks();
            
            // Select the merge task after a short delay to ensure DOM is updated
            setTimeout(() => {
              selectTask(result.mergeTask.id);
            }, 100);
          } else {
            showNotification(`✓ Task updated successfully using ${method}`, 'success');
          }
          
          // Refresh update status
          await checkForUpdates();
          
          // Re-render task details if this is the current task
          if (currentTask?.id === taskId) {
            renderTaskDetails(currentTask);
          }
        } else {
          showNotification(`Update failed: ${result.error || 'Unknown error'}`, 'error');
          if (result.hasUncommitted) {
            showGitStatus(taskId);
          }
        }
      } catch (error) {
        showNotification(`Update error: ${error.message}`, 'error');
      } finally {
        if (button) {
          button.disabled = false;
          button.textContent = button.textContent.replace('Updating...', 'Update');
        }
      }
    }
    
    async function pushChanges(taskId) {
      const pushButton = document.getElementById(`push-button-${taskId}`);
      const originalText = pushButton.textContent;
      pushButton.disabled = true;
      pushButton.textContent = 'Pushing...';
      
      try {
        const response = await fetch(`${API_BASE}/projects/${projectId}/tasks/${taskId}/git`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ operation: 'push' })
        });
        
        const result = await response.json();
        
        if (result.success) {
          showNotification('✓ Changes pushed successfully', 'success');
          // Refresh git status - this will update button visibility based on actual state
          showGitStatus(taskId);
          // Check for updates
          checkForUpdates();
        } else {
          showNotification(`Push failed: ${result.error || 'Unknown error'}`, 'error');
          pushButton.disabled = false;
          pushButton.textContent = originalText;
        }
      } catch (error) {
        showNotification(`Push error: ${error.message}`, 'error');
        pushButton.disabled = false;
        pushButton.textContent = originalText;
      }
    }
    
    // Dialog management
    let activeDialog = null;
    
    function showDialog(content, onCancel, onConfirm) {
      // Remove any existing dialog
      closeDialog();
      
      const backdrop = document.createElement('div');
      backdrop.className = 'dialog-backdrop';
      backdrop.addEventListener('click', (e) => {
        if (e.target === backdrop && onCancel) {
          onCancel();
          closeDialog();
        }
      });
      
      const dialog = document.createElement('div');
      dialog.className = 'dialog';
      dialog.innerHTML = content;
      
      // Add event listeners to buttons
      const buttons = dialog.querySelectorAll('[data-action]');
      buttons.forEach(btn => {
        btn.addEventListener('click', () => {
          const action = btn.getAttribute('data-action');
          closeDialog();
          
          if (action === 'cancel' && onCancel) {
            onCancel();
          } else if (action === 'confirm' && onConfirm) {
            onConfirm();
          } else if (typeof onConfirm === 'function') {
            // For backward compatibility
            onConfirm(action);
          }
        });
      });
      
      backdrop.appendChild(dialog);
      document.body.appendChild(backdrop);
      activeDialog = backdrop;
    }
    
    function closeDialog() {
      if (activeDialog) {
        activeDialog.remove();
        activeDialog = null;
      }
    }
    
    async function mergeToBase(taskId) {
      const mergeButton = document.getElementById(`merge-button-${taskId}`);
      const originalText = mergeButton.textContent;
      mergeButton.disabled = true;
      mergeButton.textContent = 'Checking for conflicts...';
      
      try {
        // First, check for merge conflicts
        const conflictResponse = await fetch(`${API_BASE}/projects/${projectId}/tasks/${taskId}/check-merge-conflicts`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });
        
        const conflictData = await conflictResponse.json();
        
        if (conflictData.hasConflicts) {
          // Show conflict dialog using the dialog system
          const dialogContent = `
            <h3>⚠️ Merge Conflicts Detected</h3>
            <p>The branch <strong>${currentTask.branch}</strong> has conflicts with <strong>${currentProject.base_branch}</strong>.</p>
            
            <div class="conflict-info">
              <strong>Conflicting files:</strong>
              <ul style="margin: 8px 0 0 0; padding-left: 20px;">
                ${conflictData.conflicts.map(file => `<li><code>${file}</code></li>`).join('')}
              </ul>
            </div>
            
            <p>How would you like to proceed?</p>
            
            <div class="dialog-actions">
              <button class="secondary" data-action="cancel">Cancel</button>
              <button class="primary" data-action="vim">Resolve in Vim</button>
              <button class="primary" data-action="claude">Merge with Claude</button>
            </div>
          `;
          
          showDialog(
            dialogContent,
            () => {
              // Cancel callback
              mergeButton.disabled = false;
              mergeButton.textContent = originalText;
            },
            (action) => {
              // Action callback
              if (action === 'claude') {
                mergeWithClaude(taskId);
              } else if (action === 'vim') {
                // Open terminal with git mergetool, just like Claude
                const worktreePath = currentTask.worktree_path || `/projects/${projectId}-task-${taskId}`;
                const mergetoolUrl = `http://${window.location.hostname}:7681/?arg=${encodeURIComponent(worktreePath + ' && git mergetool')}`;
                window.open(mergetoolUrl, '_blank');
                mergeButton.disabled = false;
                mergeButton.textContent = originalText;
              }
            }
          );
          
        } else {
          // No conflicts, proceed with merge
          mergeButton.textContent = 'Merging...';
          
          const mergeResponse = await fetch(`${API_BASE}/projects/${projectId}/tasks/${taskId}/merge-to-base`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
          });
          
          const mergeResult = await mergeResponse.json();
          
          if (mergeResult.success) {
            showNotification(`✓ Successfully merged ${currentTask.branch} into ${currentProject.base_branch}`, 'success');
            
            // Ensure dialog is closed
            closeDialog();
            
            // Update task status in UI
            if (currentTask) {
              currentTask.status = 'merged';
              // Reset merge tracking flags - will be updated by git status check
              currentTask.has_commits_since_merge = false;
            }
            
            // Refresh git status to update button visibility based on actual state
            showGitStatus(taskId);
            
            // Refresh task list to show updated status
            loadTasks();
            
            // Update base branch status
            checkBaseBranchStatus();
            
          } else {
            showNotification(`Merge failed: ${mergeResult.error || 'Unknown error'}`, 'error');
            mergeButton.disabled = false;
            mergeButton.textContent = originalText;
          }
        }
      } catch (error) {
        showNotification(`Merge error: ${error.message}`, 'error');
        mergeButton.disabled = false;
        mergeButton.textContent = originalText;
        // Ensure dialog is closed on error
        closeDialog();
      }
    }
    
    async function mergeWithClaude(taskId) {
      try {
        const response = await fetch(`${API_BASE}/projects/${projectId}/tasks/${taskId}/merge-to-base`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ withClaude: true })
        });
        
        const result = await response.json();
        
        if (result.success && result.mergeTask) {
          showNotification('Opening Claude to assist with merge conflicts...', 'info');
          
          // Reload tasks to include the new merge task
          await loadTasks();
          
          // Select the merge task after a short delay
          setTimeout(() => {
            selectTask(result.mergeTask.id);
          }, 100);
        } else {
          showNotification(`Failed to create merge task: ${result.error || 'Unknown error'}`, 'error');
        }
      } catch (error) {
        showNotification(`Error: ${error.message}`, 'error');
      }
    }
    
    function renderEmptyState() {
      document.getElementById('task-content').innerHTML = `
        <div class="empty-state">
          <h3>Select a task to view details</h3>
          <p>Create a new task to start working with Claude</p>
        </div>
      `;
    }
    
    // Image Upload Functions
    let uploadedImages = [];
    
    // Initialize image functionality when task is selected
    function initializeImages() {
      loadImages();
      setupDragAndDrop();
      setupPasteHandler();
    }
    
    // Toggle image section collapse
    function toggleImageSection() {
      const section = document.getElementById('image-section');
      section.classList.toggle('collapsed');
    }
    
    // Load images for current task
    async function loadImages() {
      if (!currentTask) return;
      
      try {
        const response = await fetch(`${API_BASE}/projects/${projectId}/tasks/${currentTask.id}/images`);
        const data = await response.json();
        uploadedImages = data.images || [];
        renderImages();
        updateImageCount();
      } catch (error) {
        console.error('Failed to load images:', error);
      }
    }
    
    // Update image count display
    function updateImageCount() {
      const countEl = document.getElementById('image-count');
      if (countEl) {
        countEl.textContent = uploadedImages.length > 0 ? `(${uploadedImages.length})` : '';
      }
    }
    
    // Render image grid
    function renderImages() {
      const grid = document.getElementById('image-grid');
      if (!grid) return;
      
      if (uploadedImages.length === 0) {
        grid.innerHTML = '';
        return;
      }
      
      grid.innerHTML = uploadedImages.map(image => `
        <div class="image-item">
          <img class="image-preview" 
               src="${API_BASE}/projects/${projectId}/tasks/${currentTask.id}/images/${image.filename}"
               alt="${image.filename}"
               onclick="openImageModal('${image.filename}')">
          <div class="image-info">
            <div class="image-filename" title="${image.filename}">${image.filename}</div>
            <div class="image-size">${image.sizeFormatted}</div>
            <div class="image-actions">
              <button class="copy-button" onclick="copyReference('${image.referencePath}')" title="Copy @ reference">
                📋 Copy
              </button>
              <button class="delete-button" onclick="deleteImage('${image.filename}')" title="Delete image">
                🗑️
              </button>
            </div>
          </div>
        </div>
      `).join('');
    }
    
    // File selection
    function selectFile() {
      document.getElementById('file-input').click();
    }
    
    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (file) {
        uploadImage(file);
      }
    }
    
    // Upload image
    async function uploadImage(file, filename = null) {
      if (!currentTask) return;
      
      const formData = new FormData();
      formData.append('image', file, filename || file.name);
      
      // Show progress
      const uploadZone = document.getElementById('upload-zone');
      const progressBar = uploadZone.querySelector('.upload-progress');
      const progressBarFill = uploadZone.querySelector('.upload-progress-bar');
      progressBar.style.display = 'block';
      
      try {
        const response = await fetch(`${API_BASE}/projects/${projectId}/tasks/${currentTask.id}/upload`, {
          method: 'POST',
          body: formData
        });
        
        if (!response.ok) {
          throw new Error(await response.text());
        }
        
        const result = await response.json();
        
        // Reload images
        await loadImages();
        
        // Show success
        showNotification(`✅ Uploaded: ${result.filename}`);
        
        // Copy reference to clipboard automatically
        copyReference(result.referencePath, true);
        
      } catch (error) {
        console.error('Upload failed:', error);
        alert('Upload failed: ' + error.message);
      } finally {
        // Hide progress
        progressBar.style.display = 'none';
        progressBarFill.style.width = '0%';
        
        // Reset file input
        document.getElementById('file-input').value = '';
      }
    }
    
    // Copy @ reference to clipboard
    function copyReference(path, silent = false) {
      navigator.clipboard.writeText(path).then(() => {
        if (!silent) {
          showNotification(`📋 Copied: ${path}`);
        }
      }).catch(err => {
        console.error('Failed to copy:', err);
        alert('Failed to copy to clipboard');
      });
    }
    
    // Delete image
    async function deleteImage(filename) {
      if (!confirm(`Delete ${filename}?`)) return;
      
      try {
        const response = await fetch(`${API_BASE}/projects/${projectId}/tasks/${currentTask.id}/images/${filename}`, {
          method: 'DELETE'
        });
        
        if (response.ok) {
          await loadImages();
          showNotification(`🗑️ Deleted: ${filename}`);
        }
      } catch (error) {
        alert('Failed to delete image');
      }
    }
    
    // Image modal
    function openImageModal(filename) {
      const modal = document.getElementById('image-modal');
      const img = document.getElementById('modal-image');
      img.src = `${API_BASE}/projects/${projectId}/tasks/${currentTask.id}/images/${filename}`;
      modal.style.display = 'block';
    }
    
    function closeImageModal() {
      document.getElementById('image-modal').style.display = 'none';
    }
    
    // Drag and drop
    function setupDragAndDrop() {
      const uploadZone = document.getElementById('upload-zone');
      if (!uploadZone) return;
      
      uploadZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadZone.classList.add('dragover');
      });
      
      uploadZone.addEventListener('dragleave', () => {
        uploadZone.classList.remove('dragover');
      });
      
      uploadZone.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadZone.classList.remove('dragover');
        
        const files = Array.from(e.dataTransfer.files);
        const imageFile = files.find(file => file.type.startsWith('image/'));
        
        if (imageFile) {
          uploadImage(imageFile);
        }
      });
    }
    
    // Paste handler
    function setupPasteHandler() {
      document.addEventListener('paste', async (e) => {
        if (!currentTask) return;
        
        const items = Array.from(e.clipboardData.items);
        const imageItem = items.find(item => item.type.startsWith('image/'));
        
        if (imageItem) {
          const blob = imageItem.getAsFile();
          const filename = `screenshot-${Date.now()}.png`;
          uploadImage(blob, filename);
        }
      });
      
      // Check for clipboard content periodically
      setInterval(checkClipboard, 1000);
    }
    
    // Check if clipboard has image
    async function checkClipboard() {
      try {
        const items = await navigator.clipboard.read();
        const hasImage = items.some(item => item.types.some(type => type.startsWith('image/')));
        
        const uploadZone = document.getElementById('upload-zone');
        const indicator = document.getElementById('paste-indicator');
        
        if (hasImage && currentTask) {
          uploadZone?.classList.add('has-clipboard');
          indicator.style.display = 'block';
        } else {
          uploadZone?.classList.remove('has-clipboard');
          indicator.style.display = 'none';
        }
      } catch (e) {
        // Clipboard API not available or permission denied
      }
    }
    
    // Show notification
    function showNotification(message) {
      const notification = document.createElement('div');
      notification.style.cssText = `
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #1e293b;
        color: white;
        padding: 12px 24px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        z-index: 1600;
        animation: slideIn 0.3s;
      `;
      notification.textContent = message;
      document.body.appendChild(notification);
      
      setTimeout(() => {
        notification.style.animation = 'slideIn 0.3s reverse';
        setTimeout(() => notification.remove(), 300);
      }, 3000);
    }
    
    // Update renderTaskDetails to initialize images
    const originalRenderTaskDetails = renderTaskDetails;
    renderTaskDetails = function(task) {
      originalRenderTaskDetails(task);
      setTimeout(initializeImages, 100);
    };
    
    // Handle fullscreen change events
    function handleFullscreenChange() {
      const container = document.getElementById('terminal-container');
      if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        // Exited native fullscreen
        if (container && container.classList.contains('fullscreen')) {
          container.classList.remove('fullscreen');
          document.getElementById('fullscreen-icon').textContent = '⛶';
          document.getElementById('fullscreen-text').textContent = 'Fullscreen';
        }
      }
    }
    
    document.addEventListener('fullscreenchange', handleFullscreenChange);
    document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
  </script>
</body>
</html>
