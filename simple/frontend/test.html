<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test React</title>
</head>
<body>
    <div id="root"></div>
    <script type="module">
        console.log('Script loading...');
        
        // Try to load React
        import('react').then(module => {
            console.log('React loaded:', module);
        }).catch(err => {
            console.error('Failed to load React:', err);
        });
        
        // Try to load the main app
        import('./src/main.tsx').then(module => {
            console.log('Main loaded:', module);
        }).catch(err => {
            console.error('Failed to load main:', err);
        });
    </script>
</body>
</html>
