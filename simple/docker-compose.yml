version: '3.8'

services:
  server:
    build: .
    ports:
      - "3001:3001"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GIT_REPO=/workspace
      - WORKTREE_DIR=/tmp/pocketdev-worktrees
    volumes:
      - pocketdev-workspace:/workspace
      - ./frontend:/frontend
      - ~/.pocketdev:/root/.pocketdev
    
  frontend:
    image: nginx:alpine
    ports:
      - "2424:80"
    volumes:
      - ./frontend:/usr/share/nginx/html

volumes:
  pocketdev-workspace: