version: '3.8'

services:
  # Standalone Shelltender service
  shelltender:
    build:
      context: .
      dockerfile: Dockerfile.shelltender
    container_name: pocketdev-shelltender
    working_dir: /app
    volumes:
      - ./:/app
      - ./data:/app/data
      - ./projects:/projects
    ports:
      - "8080:8080"  # WebSocket port
      - "8081:8081"  # HTTP API port
    environment:
      - SHELLTENDER_PORT=8080
      - SHELLTENDER_API_PORT=8081
      - SHELLTENDER_DATA_DIR=/app/data/shelltender-sessions
      - SHELLTENDER_MONITOR_AUTH_KEY=pocketdev-monitor-key-2024
      # AI service credentials (passed through from host)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    command: >
      sh -c "cd server && node shelltender-service.js"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API server
  backend:
    build:
      context: .
      dockerfile: Dockerfile.project-manager
    container_name: pocketdev-backend
    working_dir: /app
    depends_on:
      - shelltender
    volumes:
      - ./:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - ./projects:/projects
      - ~/.ssh:/home/pocketdev/.ssh:ro
      - pocketdev-settings:/home/pocketdev/.pocketdev
      - pocketdev-data:/app/data  # SQLite database persistence
    ports:
      - "3005:3005"
    environment:
      - PROJECTS_DIR=/projects
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - HOME=/home/pocketdev
      - SHELLTENDER_API_URL=http://shelltender:8081
      - SHELLTENDER_WS_URL=ws://shelltender:8080
      - SHELLTENDER_MONITOR_AUTH_KEY=pocketdev-monitor-key-2024
    command: >
      sh -c "cd server && node server.js"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Legacy frontend (React app in shelltender-client)
  frontend-legacy:
    build:
      context: .
      dockerfile: Dockerfile.project-manager
    container_name: pocketdev-frontend-legacy
    working_dir: /app/shelltender-client
    depends_on:
      - backend
    volumes:
      - ./shelltender-client:/app/shelltender-client
    ports:
      - "3008:3008"
    command: >
      sh -c "npm install && npm run dev"
    restart: unless-stopped


  # Optional: Original simple server (if you still need it)
  server:
    build: .
    container_name: pocketdev-simple-server
    ports:
      - "3001:3001"
      - "3003:3003"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GIT_REPO=/workspace
      - WORKTREE_DIR=/tmp/pocketdev-worktrees
    volumes:
      - pocketdev-workspace:/workspace
      - ./frontend:/frontend
      - ~/.pocketdev:/root/.pocketdev
    profiles:
      - simple  # Only starts when explicitly requested
    
  # Optional: Original frontend
  frontend:
    image: nginx:alpine
    container_name: pocketdev-frontend
    ports:
      - "2424:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    profiles:
      - simple  # Only starts when explicitly requested

volumes:
  pocketdev-workspace:
  pocketdev-settings:
  pocketdev-data:

networks:
  default:
    name: pocketdev-network