services:
  # Standalone Shelltender service
  shelltender:
    build:
      context: .
      dockerfile: Dockerfile.shelltender
    container_name: shelltender
    working_dir: /app
    volumes:
      - ./:/app
      - ./data:/app/data
      - ./projects:/projects
    ports:
      - "8080:8080"  # Unified HTTP and WebSocket port
    environment:
      - SHELLTENDER_PORT=8080
      - SHELLTENDER_DATA_DIR=/app/data/shelltender-sessions
      - SHELLTENDER_MONITOR_AUTH_KEY=pocketdev-monitor-key-2024
      # AI service credentials (passed through from host)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    command: >
      sh -c "cd /app/server && node shelltender-service.js"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API server
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: backend
    working_dir: /app
    user: pocketdev
    depends_on:
      - shelltender
    volumes:
      - ./:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - ./projects:/projects
      - ~/.ssh:/home/pocketdev/.ssh:ro
      - pocketdev-settings:/home/pocketdev/.pocketdev
      - ./data:/app/data  # SQLite database persistence
    ports:
      - "3005:3005"
    environment:
      - PROJECTS_DIR=/projects
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - HOME=/home/pocketdev
      - SHELLTENDER_API_URL=http://shelltender:8080
      - SHELLTENDER_WS_URL=ws://shelltender:8080/ws
      - SHELLTENDER_MONITOR_AUTH_KEY=pocketdev-monitor-key-2024
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
    command: >
      sh -c "cd server && node server.js"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    
  # React frontend running in Docker
  frontend:
    image: node:22-alpine
    container_name: frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:3005
      - VITE_USE_MOCKS=false
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - default

volumes:
  pocketdev-workspace:
  pocketdev-settings:
  pocketdev-data:
    external: true

networks:
  default:
    name: pocketdev-network