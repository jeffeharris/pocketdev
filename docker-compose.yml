services:
  # Shelltender Terminal Service
  shelltender:
    build:
      context: .
      dockerfile: shelltender/Dockerfile
    container_name: shelltender
    volumes:
      - ${POCKETDEV_HOME:-~/.pocketdev}/data:/app/data
      - ${POCKETDEV_HOME:-~/.pocketdev}/projects:/projects
    ports:
      - "8080:8080"
    environment:
      - SHELLTENDER_PORT=8080
      - SHELLTENDER_DATA_DIR=/app/data/shelltender-sessions
      - SHELLTENDER_MONITOR_AUTH_KEY=pocketdev-monitor-key-2024
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    command: ["node", "shelltender-service.js"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - default

  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: backend
    depends_on:
      - shelltender
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${POCKETDEV_HOME:-~/.pocketdev}/projects:/projects
      - ~/.ssh:/home/pocketdev/.ssh:ro
      - pocketdev-settings:/home/pocketdev/.pocketdev
      - ${POCKETDEV_HOME:-~/.pocketdev}/data:/app/data
    ports:
      - "3005:3005"
    environment:
      - PROJECTS_DIR=/projects
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - HOME=/home/pocketdev
      - SHELLTENDER_API_URL=http://shelltender:8080
      - SHELLTENDER_WS_URL=ws://shelltender:8080/ws
      - SHELLTENDER_MONITOR_AUTH_KEY=pocketdev-monitor-key-2024
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - default
    
  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    container_name: frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:3005
      - VITE_USE_MOCKS=false
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - default

volumes:
  pocketdev-workspace:
  pocketdev-settings:
  pocketdev-data:
    external: true

networks:
  default:
    name: pocketdev-network
